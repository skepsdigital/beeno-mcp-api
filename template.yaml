AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Beeno CRM MCP Server (agnostic — credentials via HTTP headers)

Globals:
  Function:
    Runtime: nodejs18.x
    Architectures:
      - x86_64
    Timeout: 300
    MemorySize: 256
    Tags:
      APP: beeno-mcp-server

Resources:
  BeenoMcpFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2018
        Sourcemap: false
        EntryPoints:
          - src/handler.ts
        External:
          - "@aws-sdk/*"
    Properties:
      CodeUri: .
      Handler: handler.handler
      Description: "Beeno CRM MCP Server — credentials sent by client via headers"
      Events:
        McpPost:
          Type: Api
          Properties:
            Path: /mcp
            Method: post
        McpGet:
          Type: Api
          Properties:
            Path: /mcp
            Method: get

Outputs:
  BeenoMcpApi:
    Description: URL do MCP Server
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/mcp"
  BeenoMcpFunction:
    Description: ARN da Lambda Function
    Value: !GetAtt BeenoMcpFunction.Arn
