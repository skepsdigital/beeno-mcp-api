AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Beeno CRM MCP Server (agnostic — credentials via HTTP headers)

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64 # Use ARM architecture for cost-efficiency
    Timeout: 90
    MemorySize: 256
    Tags:
      APP: beeno-mcp-server

Resources:
  BeenoMcpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  BeenoMcpFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2018
        Sourcemap: false
        EntryPoints:
          - src/handler.ts
        External:
          - "@aws-sdk/*"
    Properties:
      CodeUri: .
      Handler: handler.handler
      Description: "Beeno CRM MCP Server — credentials sent by client via headers"
      Events:
        McpPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref BeenoMcpApi
            Path: /mcp
            Method: post
        McpGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref BeenoMcpApi
            Path: /mcp
            Method: get

Outputs:
  BeenoMcpApi:
    Description: URL do MCP Server
    Value: !Sub "https://${BeenoMcpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/mcp"
  BeenoMcpFunction:
    Description: ARN da Lambda Function
    Value: !GetAtt BeenoMcpFunction.Arn
